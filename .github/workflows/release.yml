name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  checks: read

jobs:
  check:
    name: Validate
    runs-on: ubuntu-latest

    steps:
      # Release tags point at commits already pushed to main, where the
      # Flake Check workflow runs the same suite. Reuse that result
      # instead of running the check a second time in parallel.
      - name: Wait for Flake Check on the tagged commit
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          for _ in $(seq 1 60); do
            conclusion=$(gh api \
              "repos/${GITHUB_REPOSITORY}/commits/${GITHUB_SHA}/check-runs?check_name=Flake%20check" \
              --jq '[.check_runs[] | select(.status == "completed")][0].conclusion // empty')
            case "$conclusion" in
              success) echo "Flake Check passed for ${GITHUB_SHA}"; exit 0 ;;
              "") echo "Flake Check not finished for ${GITHUB_SHA}; waiting..."; sleep 30 ;;
              *) echo "Flake Check concluded '${conclusion}' for ${GITHUB_SHA}" >&2; exit 1 ;;
            esac
          done
          echo "Timed out waiting for Flake Check on ${GITHUB_SHA}" >&2
          exit 1

  release:
    name: Create Release
    needs: check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - name: Extract release notes
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          # Extract the section for this version from CHANGELOG.md
          awk "/^## \[?${VERSION}\]?/{found=1; next} /^## \[?[0-9]/{if(found) exit} found" CHANGELOG.md > release-notes.md
          if [ ! -s release-notes.md ]; then
            echo "No changelog entry found for ${VERSION}, using tag name." >&2
            echo "Release ${GITHUB_REF_NAME}" > release-notes.md
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          body_path: release-notes.md
